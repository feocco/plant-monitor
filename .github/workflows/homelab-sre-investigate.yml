name: Homelab SRE Investigate

on:
  repository_dispatch:
    types: [homelab-sre-investigate]

jobs:
  homelab-sre-codex:
    permissions:
      contents: write
      pull-requests: write
      issues: read
    uses: feocco/homelab-sre-agent/.github/workflows/homelab-sre-codex.yml@main
    with:
      issue_number: ${{ github.event.client_payload.issue_number }}
      issue_url: ${{ github.event.client_payload.issue_url }}
      service_name: ${{ github.event.client_payload.service_name }}
      container_name: ${{ github.event.client_payload.container_name }}
      fingerprint: ${{ github.event.client_payload.fingerprint }}
      state_fingerprint: ${{ github.event.client_payload.state_fingerprint }}
      deployment_repo: ${{ github.event.client_payload.deployment_repo }}
      deployment_path: ${{ github.event.client_payload.deployment_path }}
    secrets:
      openai-api-key: ${{ secrets.OPENAI_API_KEY }}
      sre-github-token: ${{ secrets.SRE_GITHUB_TOKEN }}
